<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Регистрация</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* Сброс базовых стилей */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(135deg, #74ebd5 0%, #acb6e5 100%);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #333;
      }
      .container {
        background-color: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        max-width: 400px;
        width: 100%;
        animation: fadeIn 1s ease;
      }
      h3 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.5em;
        color: #4caf50;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1em;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #4caf50;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 1em;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      button:hover {
        background-color: #45a049;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
    <script>
      // Функция отправки данных в Telegram и закрытия веб-приложения
      function sendData() {
        var login = document.getElementById("login").value;
        var password = document.getElementById("password").value;
        // Формируем объект с данными регистрации
        var data = JSON.stringify({ login: login, password: password });
        // Отправляем данные в бот через встроенный объект Telegram.WebApp
        Telegram.WebApp.sendData(data);
        // Закрываем веб-приложение
        Telegram.WebApp.close();
      }
    </script>
  </head>
  <body>
    <div class="container">
      <h3>Регистрация</h3>
      <form onsubmit="sendData(); return false;">
        <label for="login">Логин:</label>
        <input type="text" id="login" name="login" required />
        <label for="password">Пароль:</label>
        <input type="password" id="password" name="password" required />
        <button type="submit">Зарегистрироваться</button>
      </form>
    </div>
  </body>
</html>
